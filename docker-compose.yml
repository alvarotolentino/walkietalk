services:
  luxdb:
    image: ghcr.io/lux-db/lux:latest
    ports:
      - "6379:6379"

  zmq-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/walkietalk-zmq-proxy"]
    environment:
      ZMQ_PULL_ADDR: "tcp://0.0.0.0:5559"
      ZMQ_PUB_ADDR: "tcp://0.0.0.0:5560"
    ports:
      - "5559:5559"
      - "5560:5560"

  auth:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/walkietalk-auth"]
    environment:
      REDIS_URL: "redis://luxdb:6379"
      JWT_SECRET: "test-secret"
      AUTH_LISTEN_ADDR: "0.0.0.0:3001"
    ports:
      - "3001:3001"
    depends_on:
      luxdb:
        condition: service_started

  signaling-1:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/walkietalk-signaling"]
    environment:
      REDIS_URL: "redis://luxdb:6379"
      JWT_SECRET: "test-secret"
      SIGNALING_LISTEN_ADDR: "0.0.0.0:3002"
      ZMQ_PUSH_ADDR: "tcp://zmq-proxy:5559"
      ZMQ_SUB_ADDR: "tcp://zmq-proxy:5560"
    ports:
      - "3002:3002"
    depends_on:
      luxdb:
        condition: service_started
      zmq-proxy:
        condition: service_started

  signaling-2:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/walkietalk-signaling"]
    environment:
      REDIS_URL: "redis://luxdb:6379"
      JWT_SECRET: "test-secret"
      SIGNALING_LISTEN_ADDR: "0.0.0.0:3002"
      ZMQ_PUSH_ADDR: "tcp://zmq-proxy:5559"
      ZMQ_SUB_ADDR: "tcp://zmq-proxy:5560"
    ports:
      - "3003:3002"
    depends_on:
      luxdb:
        condition: service_started
      zmq-proxy:
        condition: service_started
